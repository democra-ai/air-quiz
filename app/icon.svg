<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="AIR">
  <!-- Warm cream paper background, slightly rounded -->
  <rect width="64" height="64" rx="13" ry="13" fill="#f7f2e8"/>

  <!-- Subtle inner rule echoing the editorial design -->
  <rect x="6" y="6" width="52" height="52" rx="9" ry="9" fill="none" stroke="#d8ccb4" stroke-width="0.6"/>

  <!-- Italic AIR wordmark — bold serif so it survives downscaling -->
  <text x="32" y="44"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        font-weight="700"
        font-style="italic"
        fill="#1f1814"
        text-anchor="middle"
        letter-spacing="1.4">AIR</text>

  <!-- Terracotta accent dot — the brand colour, visible even at 16×16 -->
  <circle cx="51" cy="13" r="3.2" fill="#c2492c"/>
</svg>
